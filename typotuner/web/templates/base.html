<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TypoTuner{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                    }
                }
            }
        }
    </script>
    <style>
        .card { @apply bg-slate-800 rounded-xl p-6 border border-slate-700; }
        .nav-link { @apply flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors; }
        .nav-link.active { @apply bg-brand-600 text-white; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <nav class="hidden md:flex w-64 flex-col bg-slate-800 border-r border-slate-700 p-4">
            <div class="mb-8">
                <h1 class="text-xl font-bold text-white">&#8203;&#9000; TypoTuner</h1>
                <p class="text-sm text-slate-400 mt-1">Typing Analysis</p>
            </div>
            <div class="space-y-1">
                <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
                    <span>&#128202;</span> Dashboard
                </a>
                <a href="/heatmap" class="nav-link {% block nav_heatmap %}{% endblock %}">
                    <span>&#128293;</span> Heatmap
                </a>
                <a href="/fingers" class="nav-link {% block nav_fingers %}{% endblock %}">
                    <span>&#128400;</span> Fingers
                </a>
                <a href="/recommendations" class="nav-link {% block nav_recs %}{% endblock %}">
                    <span>&#9889;</span> Recommendations
                </a>
            </div>
        </nav>

        <!-- Main -->
        <main class="flex-1 p-6 md:p-8 overflow-auto pb-20 md:pb-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Mobile nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 flex justify-around py-2 z-50">
        <a href="/" class="text-center text-xs text-slate-300 hover:text-white p-2">&#128202;<br>Dashboard</a>
        <a href="/heatmap" class="text-center text-xs text-slate-300 hover:text-white p-2">&#128293;<br>Heatmap</a>
        <a href="/fingers" class="text-center text-xs text-slate-300 hover:text-white p-2">&#128400;<br>Fingers</a>
        <a href="/recommendations" class="text-center text-xs text-slate-300 hover:text-white p-2">&#9889;<br>Recs</a>
    </nav>

    {% block scripts %}{% endblock %}
</body>
</html>
